<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الأوردرات الجديدة</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='b' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%232563eb'/><stop offset='100%25' stop-color='%2338bdf8'/></linearGradient></defs><path d='M20 25h10l8 40h42l8-30H34' fill='none' stroke='url(%23b)' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='42' cy='78' r='7' fill='%231d4ed8'/><circle cx='74' cy='78' r='7' fill='%231d4ed8'/><path d='M45 35h25M57.5 22.5v25' stroke='%230284c7' stroke-width='5' stroke-linecap='round'/></svg>">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
            color: #0f172a;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-sky-600 text-white p-5 text-center relative shadow-md">
            <div class="absolute right-6 top-5 text-3xl opacity-20"><i class="fa-solid fa-basket-shopping"></i></div>
            <h1 class="text-2xl font-extrabold tracking-tight">إدخال وتسجيل الأوردرات الجديدة</h1>
            <p class="text-sky-100 text-sm mt-1 font-medium">نظام الترحيل الفوري لصفحة المبيعات بالشيت المباشر</p>
        </div>

        <form id="order-form" onsubmit="handleOrderSubmit(event)" class="p-6 space-y-6">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                <h2 class="text-sm font-black text-blue-800 mb-4 flex items-center gap-2 border-b border-slate-200 pb-2">
                    <i class="fa-solid fa-user-tag text-base"></i> البيانات الأساسية للطلب والعميل
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">اسم العميل <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-user"></i></span>
                            <input type="text" id="customer-name" required placeholder="مثال: محمد أحمد علي" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">رقم الهاتف <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-phone"></i></span>
                            <input type="tel" id="customer-phone" required placeholder="مثال: 01xxxxxxxx" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold text-left tracking-wide bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">كود الموظف المسؤول <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-id-badge"></i></span>
                            <input type="text" id="employee-code" required placeholder="مثال: CC01" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors uppercase">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mt-4">
                    <div class="lg:col-span-1">
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">المحافظة <span class="text-red-500">*</span></label>
                        <select id="customer-governorate" required class="w-full border-2 border-slate-300 rounded-xl p-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors cursor-pointer">
                            <option value="">-- اختر المحافظة --</option>
                            <option value="القاهرة">القاهرة</option>
                            <option value="الجيزة">الجيزة</option>
                            <option value="القليوبية">القليوبية</option>
                            <option value="الإسكندرية">الإسكندرية</option>
                            <option value="الغربية">الغربية</option>
                            <option value="الدقهلية">الدقهلية</option>
                            <option value="الشرقية">الشرقية</option>
                            <option value="المنوفية">المنوفية</option>
                            <option value="البحيرة">البحيرة</option>
                            <option value="دمياط">دمياط</option>
                            <option value="بورسعيد">بورسعيد</option>
                            <option value="السويس">السويس</option>
                            <option value="الإسماعيلية">الإسماعيلية</option>
                            <option value="كفر الشيخ">كفر الشيخ</option>
                            <option value="الفيوم">الفيوم</option>
                            <option value="بني سويف">بني سويف</option>
                            <option value="المنيا">المنيا</option>
                            <option value="أسيوط">أسيوط</option>
                            <option value="سوهاج">سوهاج</option>
                            <option value="قنا">قنا</option>
                            <option value="الأقصر">الأقصر</option>
                            <option value="أسوان">أسوان</option>
                        </select>
                    </div>

                    <div class="lg:col-span-3">
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">عنوان العميل بالتفصيل <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-map-location-dot"></i></span>
                            <input type="text" id="customer-address" required placeholder="اكتب العنوان الكامل هنا..." class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                <div class="lg:col-span-2 border-2 border-slate-200 rounded-2xl p-4 bg-white shadow-sm flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                            <h3 class="text-sm font-black text-sky-800"><i class="fa-solid fa-cart-shopping ml-1 text-blue-600"></i> قائمة المنتجات المطلوبة</h3>
                            <button type="button" onclick="addProductRow()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-1.5 px-3 rounded-lg transition-colors cursor-pointer shadow flex items-center gap-1">
                                <i class="fa-solid fa-plus"></i> إضافة منتج آخر +
                            </button>
                        </div>

                        <div id="products-container" class="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                            <div class="product-row grid grid-cols-12 gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                                <div class="col-span-8">
                                    <div class="relative">
                                        <span class="absolute inset-y-0 right-0 pr-2.5 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-box-open"></i></span>
                                        <input type="text" required class="product-name-input w-full border border-slate-300 rounded-lg pr-8 pl-2 py-1.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="اكتب اسم المنتج يدوياً...">
                                    </div>
                                </div>
                                <div class="col-span-3">
                                    <input type="number" min="1" value="1" required class="product-qty w-full border border-slate-300 rounded-lg p-1.5 text-xs font-black text-center bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="الكمية">
                                </div>
                                <div class="col-span-1 text-center">
                                    <button type="button" onclick="removeProductRow(this)" class="text-red-500 hover:text-red-700 transition-colors cursor-pointer text-sm"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-2 border-slate-200 rounded-2xl p-4 bg-slate-50/50 shadow-sm flex flex-col justify-between">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5"><i class="fa-solid fa-comment-dots ml-1 text-slate-500"></i> ملاحظات إضافية على الأوردر</label>
                        <textarea id="order-notes" rows="5" placeholder="اكتب هنا أي تفاصيل أو شروط خاصة..." class="w-full border-2 border-slate-300 rounded-xl p-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 text-right resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-4 gap-2 mt-4">
                        <button type="button" onclick="resetOrderForm()" class="col-span-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xs py-3 rounded-xl transition-colors cursor-pointer shadow-sm">تفريغ</button>
                        <button type="submit" id="submit-btn" class="col-span-3 bg-gradient-to-r from-blue-700 to-sky-600 hover:from-blue-800 hover:to-sky-700 text-white font-black text-xs py-3 rounded-xl transition-all cursor-pointer shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i> إرسال وترحيل الأوردر للشيت
                        </button>
                    </div>
                </div>
            </div>

            <div id="action-status-msg" class="hidden p-3 rounded-xl font-bold text-xs text-center border"></div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpCXaJZDPM_QdmKKj0lNXETIcYoQssnqS7B0tQcHooQ9iWDHVijqqnjl6XPZ6EJld4ig/exec";

        function addProductRow() {
            const container = document.getElementById('products-container');
            const row = document.createElement('div');
            row.className = 'product-row grid grid-cols-12 gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200';
            row.innerHTML = `
                <div class="col-span-8">
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 pr-2.5 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-box-open"></i></span>
                        <input type="text" required class="product-name-input w-full border border-slate-300 rounded-lg pr-8 pl-2 py-1.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="اكتب اسم المنتج يدوياً...">
                    </div>
                </div>
                <div class="col-span-3">
                    <input type="number" min="1" value="1" required class="product-qty w-full border border-slate-300 rounded-lg p-1.5 text-xs font-black text-center bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="الكمية">
                </div>
                <div class="col-span-1 text-center">
                    <button type="button" onclick="removeProductRow(this)" class="text-red-500 hover:text-red-700 transition-colors cursor-pointer text-sm"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `;
            container.appendChild(row);
        }

        function removeProductRow(btn) {
            const rows = document.querySelectorAll('.product-row');
            if (rows.length === 1) {
                alert('لا يمكن حذف آخر منتج، يجب وجود منتج واحد على الأقل.');
                return;
            }
            btn.closest('.product-row').remove();
        }

        function resetOrderForm() {
            document.getElementById('order-form').reset();
            const container = document.getElementById('products-container');
            container.innerHTML = `
                <div class="product-row grid grid-cols-12 gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                    <div class="col-span-8">
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-2.5 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-box-open"></i></span>
                            <input type="text" required class="product-name-input w-full border border-slate-300 rounded-lg pr-8 pl-2 py-1.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="اكتب اسم المنتج يدوياً...">
                        </div>
                    </div>
                    <div class="col-span-3">
                        <input type="number" min="1" value="1" required class="product-qty w-full border border-slate-300 rounded-lg p-1.5 text-xs font-black text-center bg-white focus:outline-none focus:border-blue-500 text-slate-900" placeholder="الكمية">
                    </div>
                    <div class="col-span-1 text-center">
                        <button type="button" onclick="removeProductRow(this)" class="text-red-500 hover:text-red-700 transition-colors cursor-pointer text-sm"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `;
            hideStatus();
        }

        function showStatus(message, type = 'success') {
            const el = document.getElementById('action-status-msg');
            el.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');
            if (type === 'success') {
                el.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            } else {
                el.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }
            el.textContent = message;
        }

        function hideStatus() {
            document.getElementById('action-status-msg').classList.add('hidden');
        }

        function collectProducts() {
            const names = [...document.querySelectorAll('.product-name-input')].map(el => el.value.trim()).filter(Boolean);
            const qtys = [...document.querySelectorAll('.product-qty')].map(el => el.value.trim()).filter(Boolean);

            return {
                product: names.join(' & '),
                quantity: qtys.join(' & ')
            };
        }

        async function handleOrderSubmit(event) {
            event.preventDefault();
            hideStatus();

            const customerName = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();
            const employeeCode = document.getElementById('employee-code').value.trim().toUpperCase();
            const governorate = document.getElementById('customer-governorate').value.trim();
            const address = document.getElementById('customer-address').value.trim();
            const notes = document.getElementById('order-notes').value.trim();
            const { product, quantity } = collectProducts();

            if (!customerName || !phone || !employeeCode || !governorate || !address || !product || !quantity) {
                showStatus('من فضلك أكمل كل الحقول المطلوبة قبل الإرسال.', 'error');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'insertNewOrder');
                formData.append('customerName', customerName);
                formData.append('phone', phone);
                formData.append('product', product);
                formData.append('quantity', quantity);
                formData.append('governorate', governorate);
                formData.append('address', address);
                formData.append('employeeCode', employeeCode);
                formData.append('notes', notes);

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                    body: formData.toString()
                });

                const text = await response.text();

                if (String(text).toLowerCase().includes('success')) {
                    showStatus('تم تسجيل الأوردر بنجاح وترحيله إلى الشيت.');
                    resetOrderForm();
                } else {
                    throw new Error(text || 'Unknown response');
                }
            } catch (error) {
                console.error(error);
                showStatus('حدث خطأ أثناء إرسال الأوردر. تأكد من رابط الـ Apps Script وصلاحية النشر.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> إرسال وترحيل الأوردر للشيت';
            }
        }
    </script>
</body>
</html>
