<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الأوردرات الجديدة</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='b' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%232563eb'/><stop offset='100%25' stop-color='%2338bdf8'/></linearGradient></defs><path d='M20 25h10l8 40h42l8-30H34' fill='none' stroke='url(%23b)' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='42' cy='78' r='7' fill='%231d4ed8'/><circle cx='74' cy='78' r='7' fill='%231d4ed8'/><path d='M45 35h25M57.5 22.5v25' stroke='%230284c7' stroke-width='5' stroke-linecap='round'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%); color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-sky-600 text-white p-5 text-center relative shadow-md">
            <div class="absolute right-6 top-5 text-3xl opacity-20"><i class="fa-solid fa-basket-shopping"></i></div>
            <h1 class="text-2xl font-extrabold tracking-tight">إدخال وتسجيل الأوردرات الجديدة</h1>
            <p class="text-sky-100 text-sm mt-1 font-medium">نظام الترحيل الفوري لصفحة المبيعات بالشيت المباشر</p>
        </div>

        <form id="order-form" onsubmit="handleOrderSubmit(event)" class="p-6 space-y-6">
            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                <h2 class="text-sm font-black text-blue-800 mb-4 flex items-center gap-2 border-b border-slate-200 pb-2">
                    <i class="fa-solid fa-user-tag text-base"></i> البيانات الأساسية للطلب والعميل
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">اسم العميل <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-user"></i></span>
                            <input type="text" id="customer-name" required placeholder="مثال: محمد أحمد علي" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">رقم الهاتف <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-phone"></i></span>
                            <input type="tel" id="customer-phone" required placeholder="01xxxxxxxx" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold text-left tracking-wide bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">كود الموظف <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 text-xs"><i class="fa-solid fa-id-badge"></i></span>
                            <input type="text" id="employee-code" required placeholder="مثال: CC01" class="w-full border-2 border-slate-300 rounded-xl pr-9 pl-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600 text-slate-900 transition-colors">
                        </div>
                    </div>
                </div>

                <div id="products-container" class="space-y-4 mt-5">
                    <div class="product-row grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">اسم المنتج <span class="text-red-500">*</span></label>
                            <input type="text" class="product-name w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="اسم المنتج" required>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">الكمية <span class="text-red-500">*</span></label>
                            <input type="number" min="1" value="1" class="product-qty w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">سعر المنتج <span class="text-red-500">*</span></label>
                            <input type="number" min="0" value="0" class="product-price w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                        </div>

                        <div class="flex items-end">
                            <button type="button" onclick="removeProductRow(this)" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-xl py-2.5 text-xs font-bold transition">حذف المنتج</button>
                        </div>
                    </div>
                </div>

                <div class="mt-4 flex flex-wrap gap-3">
                    <button type="button" onclick="addProductRow()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-4 py-2 rounded-xl text-sm font-bold transition">
                        <i class="fa-solid fa-plus"></i> إضافة منتج
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">المحافظة <span class="text-red-500">*</span></label>
                        <input type="text" id="governorate" required class="w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="مثال: الجيزة">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-700 mb-1.5">العنوان <span class="text-red-500">*</span></label>
                        <input type="text" id="address" required class="w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="العنوان بالتفصيل">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">ملاحظات إضافية</label>
                    <textarea id="notes" rows="3" class="w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="أي ملاحظات إضافية"></textarea>
                </div>

                <div class="mt-5 bg-blue-50 border border-blue-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <p class="text-sm text-slate-600 font-bold">إجمالي قيمة الأوردر</p>
                        <h3 id="order-total-display" class="text-2xl font-extrabold text-blue-700">0 ج.م</h3>
                    </div>
                    <input type="hidden" id="order-total-hidden" value="0">
                </div>
            </div>

            <div class="flex items-center justify-end gap-3">
                <button type="reset" onclick="setTimeout(recalculateOrderTotal, 50)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-3 rounded-xl font-bold transition">
                    تفريغ
                </button>
                <button type="submit" class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-3 rounded-xl font-bold transition shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i> تسجيل الأوردر
                </button>
            </div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpCXaJZDPM_QdmKKj0lNXETIcYoQssnqS7B0tQcHooQ9iWDHVijqqnjl6XPZ6EJld4ig/exec";

        function normalizeEmployeeCode(value) {
            return String(value || '').replace(/\s+/g, '').trim().toUpperCase();
        }

        function addProductRow() {
            const container = document.getElementById('products-container');
            const row = document.createElement('div');
            row.className = 'product-row grid grid-cols-1 md:grid-cols-4 gap-4';
            row.innerHTML = `
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">اسم المنتج <span class="text-red-500">*</span></label>
                    <input type="text" class="product-name w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="اسم المنتج" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">الكمية <span class="text-red-500">*</span></label>
                    <input type="number" min="1" value="1" class="product-qty w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">سعر المنتج <span class="text-red-500">*</span></label>
                    <input type="number" min="0" value="0" class="product-price w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                </div>

                <div class="flex items-end">
                    <button type="button" onclick="removeProductRow(this)" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-xl py-2.5 text-xs font-bold transition">حذف المنتج</button>
                </div>
            `;
            container.appendChild(row);
        }

        function removeProductRow(btn) {
            const rows = document.querySelectorAll('.product-row');
            if (rows.length === 1) {
                alert('لا يمكن حذف آخر منتج.');
                return;
            }
            btn.closest('.product-row').remove();
            recalculateOrderTotal();
        }

        function recalculateOrderTotal() {
            const rows = document.querySelectorAll('.product-row');
            let total = 0;

            rows.forEach(row => {
                const qty = Number(row.querySelector('.product-qty')?.value || 0);
                const price = Number(row.querySelector('.product-price')?.value || 0);
                total += qty * price;
            });

            document.getElementById('order-total-hidden').value = total;
            document.getElementById('order-total-display').innerText = total.toLocaleString('ar-EG') + ' ج.م';
        }

        async function handleOrderSubmit(event) {
            event.preventDefault();

            const customerName = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();
            const employeeCode = normalizeEmployeeCode(document.getElementById('employee-code').value);
            const governorate = document.getElementById('governorate').value.trim();
            const address = document.getElementById('address').value.trim();
            const notes = document.getElementById('notes').value.trim();
            const orderValue = Number(document.getElementById('order-total-hidden').value || 0);

            const rows = document.querySelectorAll('.product-row');
            const products = [];
            const quantities = [];

            for (const row of rows) {
                const productName = row.querySelector('.product-name').value.trim();
                const qty = row.querySelector('.product-qty').value.trim();
                const price = row.querySelector('.product-price').value.trim();

                if (!productName || !qty || price === '') {
                    alert('من فضلك أكمل كل بيانات المنتجات.');
                    return;
                }

                products.push(productName);
                quantities.push(qty);
            }

            const payload = {
                action: 'insertNewOrder',
                customerName,
                phone,
                product: products.join(' & '),
                quantity: quantities.join(' & '),
                employeeCode,
                governorate,
                address,
                orderValue,
                notes,
                orderStatus: 'جاري التوصيل'
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert('تم تسجيل الأوردر بنجاح.');
                    document.getElementById('order-form').reset();
                    document.getElementById('products-container').innerHTML = `
                        <div class="product-row grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1.5">اسم المنتج <span class="text-red-500">*</span></label>
                                <input type="text" class="product-name w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" placeholder="اسم المنتج" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1.5">الكمية <span class="text-red-500">*</span></label>
                                <input type="number" min="1" value="1" class="product-qty w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1.5">سعر المنتج <span class="text-red-500">*</span></label>
                                <input type="number" min="0" value="0" class="product-price w-full border-2 border-slate-300 rounded-xl px-3 py-2.5 text-xs font-bold bg-white focus:outline-none focus:border-blue-600" oninput="recalculateOrderTotal()" required>
                            </div>
                            <div class="flex items-end">
                                <button type="button" onclick="removeProductRow(this)" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-xl py-2.5 text-xs font-bold transition">حذف المنتج</button>
                            </div>
                        </div>
                    `;
                    recalculateOrderTotal();
                } else {
                    alert('حدث خطأ أثناء تسجيل الأوردر.');
                }
            } catch (err) {
                console.error(err);
                alert('فشل الاتصال بالسيرفر.');
            }
        }

        recalculateOrderTotal();
    </script>
</body>
</html>
